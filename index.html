const TrendIndicator = ({ current, previous }) => {

  const diff = current - previous;
  if (diff > 0) return <span className="flex items-center text-emerald-500 text-xs"><ArrowUp className="w-3 h-3" />+{diff.toFixed(1)}</span>;
  if (diff < 0) return <span className="flex items-center text-red-500 text-xs"><ArrowDown className="w-3 h-3" />{diff.toFixed(1)}</span>;
  return <span className="flex items-center text-gray-500 text-xs"><Minus className="w-3 h-3" />0</span>;
};

const ProgressBar = ({ value, max = 10, color = 'red' }) => {
  const percent = (value / max) * 100;
  const colors = {
    red: 'bg-red-600',
    emerald: 'bg-emerald-500',
    amber: 'bg-amber-500',
  };
  return (
    <div className="h-2 bg-neutral-800 rounded-full overflow-hidden">
      <div className={`h-full ${colors[color]} rounded-full transition-all`} style={{ width: `${percent}%` }} />
    </div>
  );
};

const QuestionCard = ({ question, value, onChange, showRequired = false, comment, onCommentChange }) => {
  const hasComment = ['rating_10', 'rating_5', 'nps'].includes(question.type);
  
  const renderInput = () => {
    switch (question.type) {
      case 'rating_10': return <Rating10 value={value} onChange={onChange} />;
      case 'rating_5': return <Rating5 value={value} onChange={onChange} />;
      case 'nps': return <NPS value={value} onChange={onChange} />;
      case 'radio': return <RadioOptions options={question.options} value={value} onChange={onChange} />;
      case 'scale3': return <Scale3 options={question.options} value={value} onChange={onChange} />;
      case 'text': return <TextInput value={value} onChange={onChange} />;
      default: return null;
    }
  };
  return (
    <div className="bg-neutral-900 rounded-xl border border-neutral-800 p-5">
      <p className="font-medium text-gray-200 mb-4">
        {question.text}
        {showRequired && question.required && <span className="text-red-500 ml-1">*</span>}
      </p>
      {renderInput()}
      {hasComment && onCommentChange && (
        <div className="mt-3 pt-3 border-t border-neutral-800">
          <input
            type="text"
            value={comment || ''}
            onChange={e => onCommentChange(e.target.value)}
            placeholder="Ajouter un commentaire (optionnel)"
            className="w-full p-2 bg-neutral-800 border border-neutral-700 rounded-lg text-gray-300 text-sm placeholder-gray-500 focus:border-red-500 outline-none"
          />
        </div>
      )}
    </div>
  );
};

const parseTxtInterview = (text) => {
  const result = {
    type: 'staff',
    id: Date.now() + Math.random(),
    answers: {},
    competencesSelf: {},
    competencesManager: {},
    competencesComments: {},
  };

  let section = null;

  for (const rawLine of text.split('\n')) {
    const line = rawLine.trimEnd();
    const t = line.trim();
    let m;

    if ((m = t.match(/^Collaborateur\s*:\s*(.+)$/))) { result.name = m[1].trim(); continue; }
    if ((m = t.match(/^Poste\s*:\s*(.+)$/))) {
      const lbl = m[1].trim();
      result.role = lbl === 'Coach' ? 'coach' : lbl === 'Commercial' ? 'commercial' : 'manager';
      continue;
    }
    if ((m = t.match(/^Manager\s*:\s*(.+)$/))) { result.manager = m[1].trim(); continue; }
    if ((m = t.match(/^Date\s*:\s*(.+)$/))) { result.date = m[1].trim(); continue; }

    if (t.includes('OBJECTIFS')) { section = 'objectifs'; continue; }
    if (t.includes('ÉVALUATION DES COMPÉTENCES')) { section = 'competences'; continue; }
    if (t.includes('QUESTIONS RH')) { section = 'rh'; continue; }

    if (section === 'objectifs') {
      if ((m = t.match(/^Court terme.*?:\s*(.+)$/))) result.answers.obj1 = m[1].trim();
      if ((m = t.match(/^Moyen terme.*?:\s*(.+)$/))) result.answers.obj2 = m[1].trim();
      if ((m = t.match(/^Long terme.*?:\s*(.+)$/))) result.answers.obj3 = m[1].trim();
    }

    if (section === 'competences' && result.role) {
      if ((m = line.match(/^  (.+?):\s*Collab\s*(\d+)\/5\s*\|\s*Manager\s*(\d+)\/5(?:\s*→\s*(.+))?$/))) {
        const label = m[1].trim();
        const selfScore = parseInt(m[2]);
        const managerScore = parseInt(m[3]);
        const comment = m[4]?.trim();
        for (const cat of getCompetencesForRole(result.role)) {
          for (const comp of cat.competences) {
            if (comp.label === label) {
              result.competencesSelf[comp.id] = selfScore;
              result.competencesManager[comp.id] = managerScore;
              if (comment) result.competencesComments[comp.id] = comment;
            }
          }
        }
      }
    }

    if (section === 'rh') {
      if ((m = t.match(/^Bien-être au travail\s*:\s*(\d+)\/5$/))) result.answers.rh1 = parseInt(m[1]);
      if ((m = t.match(/^Commentaire bien-être\s*:\s*(.+)$/))) result.answers.rh2 = m[1].trim();
      if ((m = t.match(/^Charge de travail\s*:\s*(.+)$/))) result.answers.rh3 = m[1].trim();
      if ((m = t.match(/^Clarté des priorités\s*:\s*(\d+)\/10$/))) result.answers.rh4 = parseInt(m[1]);
      if ((m = t.match(/^Communication interne\s*:\s*(\d+)\/10$/))) result.answers.rh5 = parseInt(m[1]);
      if ((m = t.match(/^Besoins matériel\s*:\s*(.+)$/))) result.answers.rh6 = m[1].trim();
      if ((m = t.match(/^Retours adhérents\s*:\s*(.+)$/))) result.answers.rh7 = m[1].trim();
      if ((m = t.match(/^Besoins formation\s*:\s*(.+)$/))) result.answers.rh8 = m[1].trim();
      if ((m = t.match(/^Souhaits évolution\s*:\s*(.+)$/))) result.answers.rh9 = m[1].trim();
      if ((m = t.match(/^Idée DG\s*:\s*(.+)$/))) result.answers.rh10 = m[1].trim();
    }
  }

  if (!result.name || !result.role || !result.date) return null;
  return result;
};

    const file = e.target.files?.[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const imported = JSON.parse(event.target.result);
        if (Array.isArray(imported)) {
          setResponses(imported);
          setImportSuccess(true);
          setTimeout(() => setImportSuccess(false), 3000);
        } else {
          alert('Format de fichier invalide');
        }
      } catch (err) {
        alert('Erreur lors de la lecture du fichier');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const handleImportTxt = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const parsed = parseTxtInterview(event.target.result);
      if (!parsed) {
        alert('Fichier invalide : collaborateur, poste ou date manquant.');
        return;
      }
      setResponses(prev => {
        const exists = prev.some(r => r.type === 'staff' && r.name === parsed.name && r.date === parsed.date);
        if (exists) {
          return prev.map(r => (r.type === 'staff' && r.name === parsed.name && r.date === parsed.date) ? { ...parsed, id: r.id } : r);
        }
        return [...prev, parsed];
      });
      setImportTxtSuccess(`Entretien de ${parsed.name} (${parsed.date}) importé.`);
      setTimeout(() => setImportTxtSuccess(''), 4000);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Supprimer un collaborateur (tous ses entretiens)
  const handleDeleteStaff = (staffName) => {
    const filtered = responses.filter(r => !(r.type === 'staff' && r.name === staffName));
    setResponses(filtered);
    setShowDeleteConfirm(null);
  };

  return (
    <div className="min-h-screen bg-black">
      <header className="bg-neutral-900 border-b border-neutral-800 p-4">
        <div className="max-w-4xl mx-auto flex items-center gap-4">
          <button onClick={onBack} className="p-2 hover:bg-neutral-800 rounded-lg text-gray-400"><ChevronLeft className="w-5 h-5" /></button>
          <Logo size="sm" />
          <div>
            <h1 className="font-bold text-white">Tableau de bord</h1>
            <p className="text-xs text-gray-500">Entretiens Individuels</p>
          </div>
        </div>
      </header>

      <main className="max-w-4xl mx-auto p-4 space-y-6">
        {/* Stats */}
        <div className="grid grid-cols-2 gap-4">
          <div className="bg-neutral-900 rounded-xl p-4 border border-neutral-800 text-center">
            <div className="text-2xl font-bold text-white">{stats.uniqueStaff}</div>
            <div className="text-xs text-gray-500">Collaborateurs</div>
          </div>
          <div className="bg-neutral-900 rounded-xl p-4 border border-neutral-800 text-center">
            <div className="text-2xl font-bold text-white">{stats.total}</div>
            <div className="text-xs text-gray-500">Entretiens réalisés</div>
          </div>
        </div>

        {/* Import/Export */}
        <div className="bg-neutral-900 rounded-xl border border-neutral-800 p-4">
          <h2 className="font-semibold text-white mb-4 flex items-center gap-2">
            <FileText className="w-5 h-5 text-red-500" /> Sauvegarde des données
          </h2>
          <p className="text-sm text-gray-400 mb-4">
            Exportez vos données avant une mise à jour, puis réimportez-les ensuite.
          </p>
          <div className="flex gap-3">
            <button 
              onClick={handleExportAll}
              className="flex-1 py-3 bg-neutral-800 text-white rounded-xl hover:bg-neutral-700 flex items-center justify-center gap-2 border border-neutral-700"
            >
              <Download className="w-4 h-4 text-emerald-500" /> Exporter tout
            </button>
            <button 
              onClick={() => fileInputRef.current?.click()}
              className="flex-1 py-3 bg-neutral-800 text-white rounded-xl hover:bg-neutral-700 flex items-center justify-center gap-2 border border-neutral-700"
            >
              <Upload className="w-4 h-4 text-blue-500" /> Importer
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept=".json"
              onChange={handleImport}
              className="hidden"
            />
          </div>
          {importSuccess && (
            <div className="mt-3 p-3 bg-emerald-900/30 border border-emerald-800 rounded-lg text-emerald-400 text-sm text-center">
              ✓ Données importées avec succès !
            </div>
          )}
          <div className="mt-3 border-t border-neutral-800 pt-3">
            <p className="text-xs text-gray-500 mb-2">Importer un entretien depuis un fichier .txt exporté</p>
            <button
              onClick={() => txtFileInputRef.current?.click()}
              className="w-full py-2.5 bg-neutral-800 text-white rounded-xl hover:bg-neutral-700 flex items-center justify-center gap-2 border border-neutral-700 text-sm"
            >
              <Upload className="w-4 h-4 text-amber-500" /> Importer un entretien (.txt)
            </button>
            <input
              ref={txtFileInputRef}
              type="file"
              accept=".txt"
              onChange={handleImportTxt}
              className="hidden"
            />
          </div>
          {importTxtSuccess && (
            <div className="mt-3 p-3 bg-emerald-900/30 border border-emerald-800 rounded-lg text-emerald-400 text-sm text-center">
              ✓ {importTxtSuccess}
            </div>
          )}
        </div>

        {/* Collaborateurs - fiches individuelles */}
        <div className="bg-neutral-900 rounded-xl border border-neutral-800 p-4">
          <h2 className="font-semibold text-white mb-4 flex items-center gap-2"><UserCog className="w-5 h-5 text-red-500" /> Équipe</h2>
          {staffList.length === 0 ? (
            <p className="text-gray-500 text-center py-4">Aucun entretien enregistré</p>
          ) : (
            <div className="space-y-2">
              {staffList.map(s => (
                <div key={s.name} className="flex items-center gap-2">
                  <button 
                    onClick={() => onViewStaff(s.name)}
                    className="flex-1 p-4 bg-neutral-800 rounded-xl flex items-center justify-between hover:bg-neutral-700 transition-colors text-left"
                  >
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 bg-red-900/50 rounded-full flex items-center justify-center border border-red-800">
                        <span className="text-red-400 font-medium">{s.name.charAt(0)}</span>
                      </div>
                      <div>
                        <div className="flex items-center gap-2">
                          <p className="text-white font-medium">{s.name}</p>
                          {s.role && (
                            <span className="px-1.5 py-0.5 bg-neutral-700 text-gray-400 text-xs rounded">
                              {s.role === 'coach' ? '🏋️ Coach' : s.role === 'commercial' ? '💼 Commercial' : '👔 Manager'}
                            </span>
                          )}
                        </div>
                        <p className="text-xs text-gray-500">{s.count} entretien(s) • Dernier: {s.lastDate}</p>
                      </div>
                    </div>
                    <Eye className="w-5 h-5 text-gray-500" />
                  </button>
                  
                  {/* Bouton suppression avec cadenas */}
                  <button 
                    onClick={() => setShowDeleteConfirm(s.name)}
                    className="p-3 bg-neutral-800 rounded-xl hover:bg-red-900/50 transition-colors border border-neutral-700 hover:border-red-800 group"
                    title="Supprimer"
                  >
                    <Lock className="w-5 h-5 text-gray-500 group-hover:text-red-500" />
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      </main>

      {/* Modal confirmation suppression */}
      {showDeleteConfirm && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50">
          <div className="bg-neutral-900 rounded-2xl p-6 w-full max-w-sm border border-neutral-800">
            <div className="text-center mb-6">
              <div className="w-14 h-14 bg-red-900/50 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-800">
                <Trash2 className="w-7 h-7 text-red-500" />
              </div>
              <h2 className="text-xl font-bold text-white">Supprimer {showDeleteConfirm} ?</h2>
              <p className="text-sm text-gray-400 mt-2">
                Tous les entretiens de ce collaborateur seront supprimés définitivement.
              </p>
            </div>
            
            <div className="flex gap-3">
              <button 
                onClick={() => setShowDeleteConfirm(null)}
                className="flex-1 py-3 border border-neutral-700 text-gray-300 rounded-xl font-medium hover:bg-neutral-800"
              >
                Annuler
              </button>
              <button 
                onClick={() => handleDeleteStaff(showDeleteConfirm)}
                className="flex-1 py-3 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700"
              >
                Supprimer
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ============================================
// STAFF PROFILE
// ============================================

const StaffProfile = ({ staffName, responses, onBack }) => {
  const [expandedId, setExpandedId] = useState(null);

  const staffResponses = useMemo(() =>
    responses.filter(r => r.type === 'staff' && r.name === staffName)
      .sort((a, b) => new Date(b.date.split('/').reverse().join('-')) - new Date(a.date.split('/').reverse().join('-')))
  , [responses, staffName]);

  const role = staffResponses[0]?.role;
  const competenceCategories = role ? getCompetencesForRole(role) : [];

  const avgField = (response, field) => {
    if (!response?.[field]) return null;
    const vals = Object.values(response[field]).filter(v => v != null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  };

  const catAvg = (response, cat, field) => {
    const vals = cat.competences.map(c => response?.[field]?.[c.id]).filter(v => v != null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  };

  const Chip = ({ label, value, prev, max = 5, color }) => {
    const diff = value != null && prev != null ? value - prev : null;
    const arrow = diff == null ? null : diff > 0.09 ? '↑' : diff < -0.09 ? '↓' : '→';
    const arrowColor = diff > 0.09 ? 'text-emerald-400' : diff < -0.09 ? 'text-red-400' : 'text-gray-500';
    return (
      <div className="flex flex-col gap-0.5">
        <span className="text-xs text-gray-500">{label}</span>
        <span className="flex items-center gap-1">
          <span className={`font-semibold text-sm ${color || 'text-white'}`}>
            {value != null ? value.toFixed(1) : '-'}/{max}
          </span>
          {arrow && <span className={`text-xs font-bold ${arrowColor}`}>{arrow}</span>}
        </span>
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-black">
      <header className="bg-neutral-900 border-b border-neutral-800 p-4">
        <div className="max-w-4xl mx-auto flex items-center gap-4">
          <button onClick={onBack} className="p-2 hover:bg-neutral-800 rounded-lg text-gray-400"><ChevronLeft className="w-5 h-5" /></button>
          <div>
            <h1 className="font-bold text-white flex items-center gap-2">
              {staffName}
              {role && <span>{role === 'coach' ? '🏋️' : role === 'commercial' ? '💼' : '👔'}</span>}
            </h1>
            <p className="text-xs text-gray-500">{staffResponses.length} entretien(s)</p>
          </div>
        </div>
      </header>

      <main className="max-w-4xl mx-auto p-4 space-y-4">
        {staffResponses.length === 0 ? (
          <p className="text-gray-500 text-center py-8">Aucun entretien enregistré</p>
        ) : staffResponses.map((r, i) => {
          const prev = staffResponses[i + 1];
          const selfAvg = avgField(r, 'competencesSelf');
          const managerAvg = avgField(r, 'competencesManager');
          const isExpanded = expandedId === r.id;

          return (
            <div key={r.id} className="bg-neutral-900 rounded-xl border border-neutral-800 overflow-hidden">
              {/* Header */}
              <div className="flex items-center justify-between px-4 pt-4 pb-2">
                <span className="text-white font-semibold">{r.date}</span>
                <button
                  onClick={() => setExpandedId(isExpanded ? null : r.id)}
                  className="flex items-center gap-1 px-3 py-1.5 bg-neutral-800 hover:bg-neutral-700 text-gray-300 text-xs rounded-lg border border-neutral-700 transition-colors"
                >
                  Détail {isExpanded ? '▲' : '▼'}
                </button>
              </div>

              {/* Key metrics */}
              <div className="px-4 pb-3 grid grid-cols-3 gap-3">
                <Chip label="Bien-être" value={r.answers?.rh1} prev={prev?.answers?.rh1} />
                <Chip label="Auto (moy.)" value={selfAvg} prev={avgField(prev, 'competencesSelf')} color="text-red-400" />
                <Chip label="Manager (moy.)" value={managerAvg} prev={avgField(prev, 'competencesManager')} color="text-amber-400" />
              </div>

              {/* Category breakdown */}
              {competenceCategories.length > 0 && (
                <div className="px-4 pb-3 grid grid-cols-2 gap-x-4 gap-y-1.5 border-t border-neutral-800 pt-3">
                  {competenceCategories.map(cat => (
                    <div key={cat.name} className="flex items-center justify-between">
                      <span className="text-xs text-gray-400 truncate mr-2">{cat.name}</span>
                      <span className="flex items-center gap-1 shrink-0">
                        <span className="text-xs text-white font-medium">
                          {catAvg(r, cat, 'competencesSelf') != null ? catAvg(r, cat, 'competencesSelf').toFixed(1) : '-'}
                        </span>
                        {(() => {
                          const d = catAvg(r, cat, 'competencesSelf');
                          const p = catAvg(prev, cat, 'competencesSelf');
                          if (d == null || p == null) return null;
                          const diff = d - p;
                          return <span className={`text-xs font-bold ${diff > 0.09 ? 'text-emerald-400' : diff < -0.09 ? 'text-red-400' : 'text-gray-500'}`}>{diff > 0.09 ? '↑' : diff < -0.09 ? '↓' : '→'}</span>;
                        })()}
                      </span>
                    </div>
                  ))}
                </div>
              )}

              {/* Objectives */}
              {(r.answers?.obj1 || r.answers?.obj2 || r.answers?.obj3) && (
                <div className="px-4 pb-3 border-t border-neutral-800 pt-3 space-y-1">
                  {r.answers?.obj1 && <p className="text-xs text-gray-300"><span className="text-red-400 font-medium">Court :</span> {r.answers.obj1}</p>}
                  {r.answers?.obj2 && <p className="text-xs text-gray-300"><span className="text-amber-400 font-medium">Moyen :</span> {r.answers.obj2}</p>}
                  {r.answers?.obj3 && <p className="text-xs text-gray-300"><span className="text-blue-400 font-medium">Long :</span> {r.answers.obj3}</p>}
                </div>
              )}

              {/* Detail panel */}
              {isExpanded && (
                <div className="border-t border-neutral-700 bg-neutral-800/30 px-4 py-4 space-y-4">
                  {competenceCategories.map(cat => (
                    <div key={cat.name}>
                      <p className="text-xs font-semibold text-red-400 uppercase tracking-wide mb-2">{cat.name}</p>
                      <div className="space-y-1.5">
                        {cat.competences.map(comp => {
                          const self = r.competencesSelf?.[comp.id];
                          const mgr = r.competencesManager?.[comp.id];
                          const comment = r.competencesComments?.[comp.id];
                          const prevSelf = prev?.competencesSelf?.[comp.id];
                          const diff = self != null && prevSelf != null ? self - prevSelf : null;
                          return (
                            <div key={comp.id} className="flex flex-col gap-0.5">
                              <div className="flex items-center justify-between">
                                <span className="text-xs text-gray-300 flex-1 mr-2">{comp.label}</span>
                                <span className="flex items-center gap-2 text-xs shrink-0">
                                  <span className="text-gray-400">Auto <span className="text-white font-medium">{self ?? '-'}/5</span></span>
                                  <span className="text-gray-400">Manager <span className="text-amber-400 font-medium">{mgr ?? '-'}/5</span></span>
                                  {diff != null && <span className={`font-bold ${diff > 0 ? 'text-emerald-400' : diff < 0 ? 'text-red-400' : 'text-gray-500'}`}>{diff > 0 ? '↑' : diff < 0 ? '↓' : '→'}</span>}
                                </span>
                              </div>
                              {comment && <p className="text-xs text-gray-500 italic pl-2">→ {comment}</p>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}

                  {/* RH details */}
                  {(r.answers?.rh2 || r.answers?.rh3 || r.answers?.rh4 || r.answers?.rh5 || r.answers?.rh6 || r.answers?.rh7 || r.answers?.rh8 || r.answers?.rh9 || r.answers?.rh10) && (
                    <div>
                      <p className="text-xs font-semibold text-red-400 uppercase tracking-wide mb-2">Questions RH</p>
                      <div className="space-y-1 text-xs text-gray-300">
                        {r.answers?.rh2 && <p><span className="text-gray-500">Commentaire bien-être :</span> {r.answers.rh2}</p>}
                        {r.answers?.rh3 && <p><span className="text-gray-500">Charge de travail :</span> {r.answers.rh3}</p>}
                        {r.answers?.rh4 && <p><span className="text-gray-500">Clarté des priorités :</span> {r.answers.rh4}/10</p>}
                        {r.answers?.rh5 && <p><span className="text-gray-500">Communication interne :</span> {r.answers.rh5}/10</p>}
                        {r.answers?.rh6 && <p><span className="text-gray-500">Besoins matériel :</span> {r.answers.rh6}</p>}
                        {r.answers?.rh7 && <p><span className="text-gray-500">Retours adhérents :</span> {r.answers.rh7}</p>}
                        {r.answers?.rh8 && <p><span className="text-gray-500">Besoins formation :</span> {r.answers.rh8}</p>}
                        {r.answers?.rh9 && <p><span className="text-gray-500">Souhaits évolution :</span> {r.answers.rh9}</p>}
                        {r.answers?.rh10 && <p><span className="text-gray-500">Idée DG :</span> {r.answers.rh10}</p>}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </main>
    </div>
  );
};

// ============================================
// MAIN APP
// ============================================

const App = function NatifEntretiens() {
  const [page, setPage] = useState('home');
  const [selectedStaff, setSelectedStaff] = useState(null);
  const [lastStaffResponse, setLastStaffResponse] = useState(null);
  const [lastStaffName, setLastStaffName] = useState('');
  const [lastStaffRole, setLastStaffRole] = useState(null);
  const [responses, setResponses] = useState(() => {
    try {
      const saved = localStorage.getItem('natif-entretiens-data');
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return [];
  });

  useEffect(() => {
    try {
      localStorage.setItem('natif-entretiens-data', JSON.stringify(responses));
    } catch(e) {}
  }, [responses]);

  const handleSelect = (type) => {
    if (type === 'admin') setPage('admin');
    else if (type === 'staff') setPage('survey');
  };

  const handleComplete = (staffResponse, staffName, staffRole) => {
    setLastStaffResponse(staffResponse);
    setLastStaffName(staffName);
    setLastStaffRole(staffRole);
    setPage('staffComplete');
  };
  
  const handleBack = () => { 
    setPage('home'); 
    setSelectedStaff(null); 
    setLastStaffResponse(null);
    setLastStaffName('');
    setLastStaffRole(null);
  };
  
  const handleViewStaff = (name) => { setSelectedStaff(name); setPage('staffProfile'); };

  // Get competence categories for last staff
  const lastStaffCompetenceCategories = lastStaffRole ? getCompetencesForRole(lastStaffRole) : [];

  switch (page) {
    case 'survey':
      return <StaffSurvey onBack={handleBack} onComplete={handleComplete} responses={responses} setResponses={setResponses} history={responses} />;
    case 'staffComplete':
      return <StaffCompletePage 
        onBack={handleBack} 
        lastResponse={lastStaffResponse} 
        allResponses={responses} 
        staffName={lastStaffName}
        competenceCategories={lastStaffCompetenceCategories}
      />;
    case 'admin':
      return <AdminPage onBack={handleBack} responses={responses} onViewStaff={handleViewStaff} setResponses={setResponses} />;
    case 'staffProfile':
      return <StaffProfile staffName={selectedStaff} responses={responses} onBack={() => setPage('admin')} />;
    default:
      return <HomePage onSelect={handleSelect} />;
  }
}

// Render
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
